{% extends "base.html" %}

{% block title %}Your API Key{% endblock %}

{% block content %}
<div class="container">
    <h2 class="text-center mb-4"><i class="bi bi-key biography-icon"></i> Your API Key</h2>

    <style>
        /* General Styles */
        body {
            background-color: #f8f9fa;
            font-family: 'Arial', sans-serif;
        }

        .card {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            text-align: center;
        }

        .biography-icon {
            font-size: 1.6rem;
            margin-right: 10px;
            color: #007bff;
        }

        .code-block {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            border-left: 5px solid #007bff;
            font-family: monospace;
            font-size: 1.1rem;
            word-wrap: break-word;
            display: block;
            text-align: center;
            margin: 10px 0;
        }

        .alert-warning {
            font-size: 0.9rem;
            text-align: center;
        }
    </style>

    <div class="row justify-content-center">
        <div class="col-md-12">
            <div class="card p-3">
                <div class="card-body text-center">
                    <h5 class="card-title"><i class="bi bi-lock biography-icon"></i> Secure Your API Key</h5>
                    <p><strong>Use this API Key to access records:</strong></p>
                    <div class="code-block">{{ api_key }}</div>
                    <div class="alert alert-warning">
                        ⚠️ Keep it safe and do not share it with others.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
